<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Niche Finder</title>
<link href="https://fonts.googleapis.com/css2?family=Croissant+One&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1 class="title">Niche Finder</h1>

  <div class="form-container">
    <input type="text" class="input-field" placeholder="Keyword">
    <select class="dropdown">
      <option value="5">Analyse 5 annonces</option>
      <option value="10">Analyse 10 annonces</option>
      <option value="20">Analyse 20 annonces</option>
      <option value="50">Analyse 50 annonces</option>
    </select>
    <button class="start-btn">START</button>
  </div>
</div>

<div id="results"></div>

<div id="loader" class="loader hidden">
  <div class="spinner"></div>
  <p>Recherche en cours...</p>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>
</body>
</html>
