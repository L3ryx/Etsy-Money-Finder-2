<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>AI Product Finder</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
padding:40px;
text-align:center;
}

.container{
max-width:700px;
margin:auto;
}

input,button{
padding:10px;
margin:10px;
}

button{
background:#22c55e;
border:none;
color:white;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

#logs{
background:#020617;
padding:15px;
margin-top:20px;
height:200px;
overflow:auto;
text-align:left;
border-radius:8px;
}

.result{
background:#1e293b;
margin-top:15px;
padding:10px;
border-radius:8px;
}

img{
max-width:200px;
border-radius:6px;
}

</style>

</head>

<body>

<div class="container">

<h1>AI Product Finder</h1>

<h2>Search Etsy</h2>

<input id="keyword" placeholder="keyword">

<input id="limit" type="number" value="10">

<button onclick="searchEtsy()">
Search
</button>

<h2>Upload Images</h2>

<input type="file" id="images" multiple>

<button onclick="analyzeImages()">
Analyze Images
</button>

<h2>Logs</h2>

<div id="logs"></div>

<h2>Results</h2>

<div id="results"></div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>

</body>
</html>
