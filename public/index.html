<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Etsy → AliExpress Finder</title>

<style>

body{
  font-family: Arial;
  background:#0f172a;
  color:white;
  text-align:center;
  padding:20px;
}

input,button{
  padding:10px;
  margin:5px;
  border-radius:6px;
  border:none;
}

button{
  background:#22c55e;
  color:white;
  cursor:pointer;
}

button:hover{
  background:#16a34a;
}

#etsy-results{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:15px;
  margin-top:20px;
}

.etsy-item{
  background:#1e293b;
  padding:10px;
  border-radius:10px;
  width:150px;
}

.etsy-item img{
  width:120px;
  border-radius:6px;
}

#results{
  margin-top:30px;
}

.result-block{
  background:#1e293b;
  margin:20px auto;
  padding:20px;
  border-radius:10px;
  max-width:900px;
}

.match{
  margin-top:10px;
}

.match img{
  width:120px;
  border-radius:6px;
}

#logs{
  background:black;
  padding:10px;
  margin-top:20px;
  height:180px;
  overflow-y:auto;
  text-align:left;
  font-size:14px;
  border-radius:6px;
}

</style>

</head>

<body>

<h1>Etsy → AliExpress Finder</h1>

<input id="keyword" placeholder="Enter keyword">
<input id="limit" type="number" value="10" min="1" max="50">

<br>

<button onclick="searchEtsy()">Search Etsy</button>
<button onclick="analyzeImages()">Analyze Images</button>

<h2>Etsy Results</h2>
<div id="etsy-results"></div>

<h2>AliExpress Matches</h2>
<div id="results"></div>

<h2>Logs</h2>
<div id="logs"></div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>

</body>
</html>
