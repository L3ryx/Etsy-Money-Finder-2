<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Etsy → AliExpress Finder</title>
<link href="https://fonts.googleapis.com/css2?family=Croissant+One&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>Etsy → AliExpress Finder</h1>

  <div class="form-container">
    <input type="text" id="keyword" placeholder="Entrez un mot-clé Etsy">
    <select id="limit">
      <option value="5">5 annonces</option>
      <option value="10">10 annonces</option>
      <option value="20">20 annonces</option>
      <option value="50">50 annonces</option>
    </select>
    <button id="startBtn">START</button>
  </div>

  <div id="loader" class="loader hidden">
    <div class="spinner"></div>
    <p>Recherche en cours...</p>
  </div>

  <div id="results"></div>
</div>

<script>
const startBtn = document.getElementById("startBtn");
const resultsContainer = document.getElementById("results");
const loader = document.getElementById("loader");

startBtn.addEventListener("click", async () => {
  const keyword = document.getElementById("keyword").value.trim();
  const limit = document.getElementById("limit").value;

  if(!keyword){
    alert("⚠️ Entrez un mot-clé !");
    return;
  }

  loader.classList.remove("hidden");
  startBtn.disabled = true;
  startBtn.innerText = "Recherche...";

  try {
    const response = await fetch("/search-etsy", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ keyword, limit })
    });

    const data = await response.json();
    resultsContainer.innerHTML = "";

    if(data.results && data.results.length > 0){

      data.results.forEach(item => {
        const card = document.createElement("div");
        card.className = "result-card";

        let aliHTML = "";
        if(item.ali_results && item.ali_results.length > 0){
          aliHTML = "<h4>AliExpress:</h4><ul>";
          item.ali_results.forEach(a => {
            aliHTML += `<li><a href="${a.url}" target="_blank">${a.title}</a></li>`;
          });
          aliHTML += "</ul>";
        } else {
          aliHTML = "<p>Aucun résultat AliExpress trouvé.</p>";
        }

        card.innerHTML = `
          <img src="${item.etsy_image}" alt="Etsy image">
          ${aliHTML}
        `;

        resultsContainer.appendChild(card);
      });

    } else {
      resultsContainer.innerHTML = "<p>Aucun résultat trouvé sur Etsy.</p>";
    }

  } catch(error){
    console.error(error);
    alert("Erreur serveur ❌");
  }

  loader.classList.add("hidden");
  startBtn.disabled = false;
  startBtn.innerText = "START";
});
</script>

</body>
</html>
