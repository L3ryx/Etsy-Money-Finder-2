<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Niche Finder</title>

<!-- 🔥 POLICE -->
<link href="https://fonts.googleapis.com/css2?family=Croissant+One&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ================= BACKGROUND ================= -->
<img src="/background.gif" class="gif-background">

<!-- ================= SMOKE ================= -->
<div class="smoke-container">
  <div class="smoke"></div>
  <div class="smoke"></div>
  <div class="smoke"></div>
</div>

<!-- ================= MAIN FORM ================= -->
<div class="container">
  <h1 class="title">Niche Finder</h1>
  <div class="form-container">
    <input type="text" id="keyword" class="input-field" placeholder="Keyword">
    <select id="limit" class="dropdown">
      <option value="5">Analyse 5 annonces</option>
      <option value="10">Analyse 10 annonces</option>
      <option value="20">Analyse 20 annonces</option>
      <option value="50">Analyse 50 annonces</option>
    </select>
    <button class="start-btn" onclick="searchEtsy()">START</button>
  </div>
</div>

<!-- ================= RESULTS ================= -->
<div id="results"></div>

<!-- ================= LOADER ================= -->
<div id="loader" class="loader hidden">
  <div class="spinner"></div>
  <p>Recherche en cours...</p>
</div>

<!-- ================= MATRIX CANVAS ================= -->
<canvas id="matrix"></canvas>

<!-- ================= SCRIPT ================= -->
<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>

</body>
</html>
