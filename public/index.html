<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Etsy → AliExpress Finder</title>
<style>
body { font-family: Arial,sans-serif; background:#0f172a; color:white; text-align:center; padding:20px; }
input,button { padding:10px;margin:5px;border-radius:4px;border:none; }
button { background:#22c55e;color:white; cursor:pointer; }
.result-card { background:#1e293b; margin:20px auto; padding:15px; border-radius:10px; max-width:800px; display:flex; gap:20px; justify-content:space-between; }
.result-card img { width:120px; border-radius:6px; }
#logs { background:black; padding:10px; margin-top:20px; height:150px; overflow-y:auto; text-align:left; }
</style>
</head>
<body>

<h1>Etsy → AliExpress Finder</h1>

<input id="keyword" placeholder="Enter keyword">
<input id="limit" type="number" value="10" min="1" max="50">
<button id="searchBtn">Search</button>

<h2>Logs</h2>
<div id="logs"></div>

<h2>Results</h2>
<div id="results"></div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>

</body>
</html>
