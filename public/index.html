<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Etsy Money Finder</title>

<script src="/socket.io/socket.io.js"></script>

<style>

/* ================= GLOBAL ================= */

*{
  box-sizing:border-box;
}

html, body{
  margin:0;
  padding:0;
  min-height:100%;
  width:100%;

  background:black;
  font-family:Arial;
  color:white;

  overflow-x:hidden;     /* ✅ bloque horizontal */
  overflow-y:auto;       /* ✅ ACTIVE LE SCROLL */
  -webkit-overflow-scrolling:touch;
}

/* 🔥 IMPORTANT → ne bloque pas le scroll */
body{
  position:relative;
}

/* ================= MATRIX ================= */

#matrix{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-1;
  pointer-events:none; /* ✅ ne bloque pas le swipe */
}

/* ================= TITLE ================= */

.title{
  text-align:center;
  font-size:32px;
  margin-top:30px;
  font-weight:bold;
}

/* ================= CENTER ================= */

.main-center{
  display:flex;
  flex-direction:column;
  align-items:center;
  margin-top:40px;
  padding-bottom:120px; /* ✅ PERMET LE SCROLL */
}

/* ================= SEARCH ================= */

.search-box{
  display:flex;
  gap:10px;
  align-items:center;
  flex-wrap:wrap;
  justify-content:center;
}

input, select{
  padding:8px;
  border-radius:8px;
  border:none;
}

/* ================= START BUTTON ================= */

.start-btn{
  background:#00ff66;
  border:none;
  padding:6px 18px;
  border-radius:20px;
  font-size:13px;
  font-weight:bold;
  cursor:pointer;
  transition:0.2s;
}

.start-btn:hover{
  transform:scale(1.1);
}

/* ================= LOADER ROTATING LOGO ================= */

.loader-container{
  margin-top:25px;
  display:none;
  justify-content:center;
  align-items:center;
}

.loader{
  font-size:40px;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  from{ transform:rotate(0deg); }
  to{ transform:rotate(360deg); }
}

/* ================= RESULTS ================= */

#results{
  margin-top:20px;
  width:90%;
  text-align:center;
}

.result-card{
  background:#111;
  padding:15px;
  border-radius:10px;
  margin:10px 0;
}

.result-card img{
  max-width:100%;
  border-radius:8px;
}

.result-card a{
  color:#00ffcc;
  text-decoration:none;
}

</style>

</head>
<body>

<canvas id="matrix"></canvas>

<h1 class="title">Etsy Money Finder</h1>

<div class="main-center">

<div class="search-box">

<input type="text" id="keyword" placeholder="Keyword">

<select id="limit">
<option value="1">1</option>
<option value="10">10</option>
<option value="50">50</option>
<option value="100">100</option>
<option value="300">300</option>
</select>

<button onclick="searchEtsy()" class="start-btn">
🚀 START
</button>

</div>

<!-- ✅ LOADER ROTATIF -->
<div class="loader-container" id="loader">
<div class="loader">🔥</div>
</div>

<div id="results"></div>

</div>

<script>

const socket = io();
const loader = document.getElementById("loader");

/* ============================================= */
/* SEARCH */
/* ============================================= */

async function searchEtsy(){

  showLoader();

  const keyword = document.getElementById("keyword").value;
  const limit = document.getElementById("limit").value;

  const response = await fetch("/search-etsy", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ keyword, limit })
  });

  const data = await response.json();

  hideLoader();

  displayResults(data.results);
}

/* ============================================= */
/* LOADER */
/* ============================================= */

function showLoader(){
  loader.style.display = "flex";
}

function hideLoader(){
  loader.style.display = "none";
}

/* ============================================= */
/* RESULTS */
/* ============================================= */

function displayResults(results){

  const container = document.getElementById("results");
  container.innerHTML = "";

  if(!results || results.length === 0){
    container.innerHTML = "<h3>No results found</h3>";
    return;
  }

  results.forEach(item => {

    const card = document.createElement("div");
    card.className = "result-card";

    card.innerHTML = `
      <img src="${item.image}">
      <br><br>
      🔗 <a href="${item.link}" target="_blank">
        Open Listing
      </a>
    `;

    container.appendChild(card);

  });
}

/* ============================================= */
/* MATRIX */
/* ============================================= */

const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

function resizeCanvas(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

resizeCanvas();

const letters = "010101ETSYMONEYFINDER";
const fontSize = 16;

let columns = canvas.width / fontSize;
let drops = [];

for(let i=0;i<columns;i++){
  drops[i] = 1;
}

function drawMatrix(){

  ctx.fillStyle = "rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "#00ff00";
  ctx.font = fontSize + "px monospace";

  for(let i=0;i<drops.length;i++){

    const text = letters[Math.floor(Math.random()*letters.length)];

    ctx.fillText(text, i*fontSize, drops[i]*fontSize);

    if(drops[i]*fontSize > canvas.height && Math.random()>0.975){
      drops[i] = 0;
    }

    drops[i]++;
  }
}

setInterval(drawMatrix,50);

window.addEventListener("resize", () => {
  resizeCanvas();
});

</script>

</body>
</html>
