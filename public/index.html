<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Reverse Image Search</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}

h1{
margin-bottom:30px;
}

.upload-box{
background:#1e293b;
padding:30px;
border-radius:10px;
width:400px;
margin:auto;
}

button{
margin-top:20px;
padding:12px 25px;
background:#22c55e;
border:none;
color:white;
font-size:16px;
cursor:pointer;
border-radius:6px;
}

button:hover{
background:#16a34a;
}

#logs{
margin-top:40px;
background:#020617;
padding:20px;
border-radius:10px;
height:200px;
overflow:auto;
text-align:left;
}

.result{
background:#1e293b;
padding:15px;
margin-top:15px;
border-radius:10px;
}

</style>
</head>

<body>

<h1>AI Image Search Tool</h1>

<div class="upload-box">

<input type="file" id="images" multiple>

<br>

<button onclick="startSearch()">
Start Analysis
</button>

</div>

<h2>Logs</h2>

<div id="logs"></div>

<h2>Results</h2>

<div id="results"></div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>

</body>
</html>
